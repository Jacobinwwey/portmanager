name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/contracts/**'
      - 'docs-site/**'
      - 'scripts/docs/**'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm --dir docs-site --ignore-workspace install --frozen-lockfile --prefer-offline

      - name: Build docs site
        env:
          PORTMANAGER_DOCS_BASE: /portmanager/
        run: pnpm --dir docs-site --ignore-workspace run docs:build

      - name: Verify generated locale pages are committed
        run: git diff --exit-code -- docs-site/en docs-site/zh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
