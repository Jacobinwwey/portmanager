name: mainline-acceptance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

concurrency:
  group: mainline-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            docs-site/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install docs-site dependencies
        run: pnpm --dir docs-site --ignore-workspace install --frozen-lockfile --prefer-offline

      - name: Run mainline acceptance verification
        run: pnpm acceptance:verify

  confidence:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            docs-site/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install docs-site dependencies
        run: pnpm --dir docs-site --ignore-workspace install --frozen-lockfile --prefer-offline

      - name: Restore milestone confidence history
        uses: actions/cache/restore@v4
        with:
          path: |
            .portmanager/reports/milestone-confidence-history.json
            .portmanager/reports/milestone-confidence-summary.md
          key: milestone-confidence-history-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            milestone-confidence-history-${{ runner.os }}-${{ github.ref_name }}-

      - name: Run milestone confidence verification
        id: confidence_run
        continue-on-error: true
        run: pnpm milestone:verify:confidence

      - name: Upload milestone confidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone-confidence-bundle-${{ github.event_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .portmanager/reports/milestone-confidence-report.json
            .portmanager/reports/milestone-confidence-history.json
            .portmanager/reports/milestone-confidence-summary.md
          if-no-files-found: error

      - name: Save milestone confidence history
        if: always() && hashFiles('.portmanager/reports/milestone-confidence-history.json') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            .portmanager/reports/milestone-confidence-history.json
            .portmanager/reports/milestone-confidence-summary.md
          key: milestone-confidence-history-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Enforce milestone confidence success
        if: always()
        run: |
          if [ "${{ steps.confidence_run.outcome }}" != "success" ]; then
            exit 1
          fi
