name: mainline-acceptance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mainline-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            docs-site/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install docs-site dependencies
        run: pnpm --dir docs-site --ignore-workspace install --frozen-lockfile --prefer-offline

      - name: Run mainline acceptance verification
        run: pnpm acceptance:verify

  confidence:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            docs-site/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install docs-site dependencies
        run: pnpm --dir docs-site --ignore-workspace install --frozen-lockfile --prefer-offline

      - name: Run milestone confidence verification
        run: pnpm milestone:verify:confidence
