openapi: 3.1.0
info:
  title: PortManager Controller API
  version: v0.1.0-docs-baseline
  description: Docs-first controller API baseline for PortManager V1.
servers:
  - url: http://localhost:8710/api/controller
    description: Gateway-ready consumer boundary
  - url: http://localhost:8710
    description: Legacy direct controller boundary
tags:
  - name: controller
  - name: hosts
  - name: bridge-rules
  - name: exposure-policies
  - name: health-checks
  - name: operations
  - name: events
  - name: rollback-points
  - name: backups
  - name: snapshots-diagnostics
paths:
  /hosts:
    get:
      tags: [hosts]
      summary: List managed hosts
      responses:
        '200':
          description: Host list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/HostSummary'
    post:
      tags: [hosts]
      summary: Create host draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHostRequest'
      responses:
        '202':
          description: Host creation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /hosts/{hostId}:
    get:
      tags: [hosts]
      summary: Get host detail
      parameters:
        - $ref: '#/components/parameters/HostId'
      responses:
        '200':
          description: Host detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostDetail'
  /hosts/{hostId}/probe:
    post:
      tags: [hosts]
      summary: Probe host readiness prerequisites
      parameters:
        - $ref: '#/components/parameters/HostId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeHostRequest'
      responses:
        '202':
          description: Probe operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /hosts/{hostId}/bootstrap:
    post:
      tags: [hosts]
      summary: Bootstrap a host
      parameters:
        - $ref: '#/components/parameters/HostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapHostRequest'
      responses:
        '202':
          description: Bootstrap operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /bridge-rules:
    get:
      tags: [bridge-rules]
      summary: List bridge rules
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BridgeRule'
    post:
      tags: [bridge-rules]
      summary: Create bridge rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBridgeRuleRequest'
      responses:
        '202':
          description: Rule creation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /bridge-rules/{ruleId}:
    get:
      tags: [bridge-rules]
      summary: Get bridge rule detail
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '200':
          description: Rule detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeRule'
    patch:
      tags: [bridge-rules]
      summary: Update bridge rule
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBridgeRuleRequest'
      responses:
        '202':
          description: Rule update accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
    delete:
      tags: [bridge-rules]
      summary: Remove bridge rule
      parameters:
        - $ref: '#/components/parameters/RuleId'
      responses:
        '202':
          description: Rule removal accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /bridge-rules/{ruleId}/drift-check:
    post:
      tags: [bridge-rules]
      summary: Verify rule drift against expected runtime state
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunDriftCheckRequest'
      responses:
        '202':
          description: Drift verification accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /exposure-policies/{hostId}:
    get:
      tags: [exposure-policies]
      summary: Get host exposure policy
      parameters:
        - $ref: '#/components/parameters/HostId'
      responses:
        '200':
          description: Exposure policy detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExposurePolicy'
    put:
      tags: [exposure-policies]
      summary: Replace host exposure policy
      parameters:
        - $ref: '#/components/parameters/HostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExposurePolicyUpdateRequest'
      responses:
        '202':
          description: Policy update accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /batch-operations/exposure-policies/apply:
    post:
      tags: [operations]
      summary: Apply host exposure policy across multiple hosts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchExposurePolicyApplyRequest'
      responses:
        '202':
          description: Batch policy apply accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /health-checks:
    get:
      tags: [health-checks]
      summary: List health checks
      parameters:
        - name: hostId
          in: query
          schema:
            type: string
        - name: ruleId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Health check list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/HealthCheck'
  /operations:
    get:
      tags: [operations]
      summary: List operations
      parameters:
        - name: hostId
          in: query
          schema:
            type: string
        - name: ruleId
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [queued, running, succeeded, failed, degraded, cancelled]
        - name: type
          in: query
          schema:
            type: string
            enum: [create_host, probe_host, bootstrap_host, create_rule, update_rule, remove_rule, apply_policy, batch_apply_policy, verify_rule, backup, diagnostics, rollback]
        - name: parentOperationId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Operation list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OperationSummary'
  /operations/{operationId}:
    get:
      tags: [operations]
      summary: Get operation detail
      parameters:
        - $ref: '#/components/parameters/OperationId'
      responses:
        '200':
          description: Operation detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationDetail'
  /operations/events:
    get:
      tags: [operations]
      summary: Subscribe to operation and event stream
      parameters:
        - name: operationId
          in: query
          schema:
            type: string
        - name: hostId
          in: query
          schema:
            type: string
        - name: ruleId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/EventStreamEnvelope'
  /events:
    get:
      tags: [events]
      summary: List recent operation events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: operationId
          in: query
          schema:
            type: string
        - name: hostId
          in: query
          schema:
            type: string
        - name: ruleId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Event history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
  /event-audit-index:
    get:
      tags: [events]
      summary: List indexed operation, event, and audit review entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: operationId
          in: query
          schema:
            type: string
        - name: hostId
          in: query
          schema:
            type: string
        - name: parentOperationId
          in: query
          schema:
            type: string
        - name: ruleId
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [queued, running, succeeded, failed, degraded, cancelled]
        - name: type
          in: query
          schema:
            type: string
            enum: [create_host, probe_host, bootstrap_host, create_rule, update_rule, remove_rule, apply_policy, batch_apply_policy, verify_rule, backup, diagnostics, rollback]
      responses:
        '200':
          description: Indexed event and audit review entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAuditIndexResponse'
  /persistence-readiness:
    get:
      tags: [controller]
      summary: Get controller persistence readiness
      responses:
        '200':
          description: Persistence readiness detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersistenceReadiness'
  /persistence-decision-pack:
    get:
      tags: [controller]
      summary: Get controller persistence promotion decision pack
      responses:
        '200':
          description: Persistence promotion decision detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersistenceDecisionPack'
  /consumer-boundary-decision-pack:
    get:
      tags: [controller]
      summary: Get controller consumer-boundary split criteria pack
      responses:
        '200':
          description: Consumer-boundary split criteria detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerBoundaryDecisionPack'
  /deployment-boundary-decision-pack:
    get:
      tags: [controller]
      summary: Get controller deployment-boundary decision pack
      responses:
        '200':
          description: Deployment-boundary decision detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentBoundaryDecisionPack'
  /second-target-policy-pack:
    get:
      tags: [controller]
      summary: Get controller second-target policy pack
      responses:
        '200':
          description: Second-target policy detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecondTargetPolicyPack'
  /rollback-points:
    get:
      tags: [rollback-points]
      summary: List rollback points
      parameters:
        - name: hostId
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [ready, applied, invalid]
      responses:
        '200':
          description: Rollback point list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RollbackPoint'
  /rollback-points/{rollbackPointId}/apply:
    post:
      tags: [rollback-points]
      summary: Apply rollback point
      parameters:
        - $ref: '#/components/parameters/RollbackPointId'
      responses:
        '202':
          description: Rollback operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /backups:
    get:
      tags: [backups]
      summary: List backups
      parameters:
        - name: hostId
          in: query
          schema:
            type: string
        - name: operationId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Backup list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BackupSummary'
  /backups/run:
    post:
      tags: [backups]
      summary: Trigger backup
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunBackupRequest'
      responses:
        '202':
          description: Backup accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /snapshots/diagnostics:
    post:
      tags: [snapshots-diagnostics]
      summary: Run diagnostics and webpage snapshot capture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunDiagnosticsRequest'
      responses:
        '202':
          description: Diagnostics operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationAccepted'
  /diagnostics:
    get:
      tags: [snapshots-diagnostics]
      summary: List diagnostics operations with snapshot evidence
      parameters:
        - name: hostId
          in: query
          schema:
            type: string
        - name: ruleId
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [queued, running, succeeded, failed, degraded, cancelled]
      responses:
        '200':
          description: Diagnostics operation list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OperationDetail'
components:
  parameters:
    HostId:
      name: hostId
      in: path
      required: true
      schema:
        type: string
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: string
    RollbackPointId:
      name: rollbackPointId
      in: path
      required: true
      schema:
        type: string
  schemas:
    OperationAccepted:
      type: object
      required: [operationId, state]
      properties:
        operationId:
          type: string
        state:
          type: string
          enum: [queued, running]
    TargetProfileSummary:
      type: object
      required: [id, label, status]
      properties:
        id:
          type: string
        label:
          type: string
        status:
          type: string
          enum: [supported, candidate, unsupported]
    TargetProfile:
      allOf:
        - $ref: '#/components/schemas/TargetProfileSummary'
        - type: object
          required:
            [
              platform,
              serviceManager,
              steadyStateTransport,
              bootstrapTransport,
              capabilities
            ]
          properties:
            platform:
              type: string
            serviceManager:
              type: string
            steadyStateTransport:
              type: string
            bootstrapTransport:
              type: string
            capabilities:
              type: array
              items:
                type: string
                enum:
                  [
                    probe-host,
                    bootstrap-host,
                    apply-desired-state,
                    collect-diagnostics,
                    rollback
                  ]
    HostSummary:
      type: object
      required:
        [
          id,
          name,
          lifecycleState,
          tailscaleAddress,
          agentState,
          agentHeartbeatState,
          targetProfileId,
          targetProfileLabel,
          targetProfileStatus,
          updatedAt
        ]
      properties:
        id:
          type: string
        name:
          type: string
        lifecycleState:
          type: string
          enum: [draft, probing, bootstrapping, ready, degraded, retired]
        tailscaleAddress:
          type: string
        agentState:
          type: string
          enum: [unknown, ready, degraded, failed, unreachable]
        agentVersion:
          type: string
        agentHeartbeatAt:
          type: string
          format: date-time
        agentHeartbeatState:
          type: string
          enum: [unknown, live, stale, unreachable]
        targetProfileId:
          type: string
        targetProfileLabel:
          type: string
        targetProfileStatus:
          type: string
          enum: [supported, candidate, unsupported]
        lastBackupAt:
          type: string
          format: date-time
        lastDiagnosticsAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    HostDetail:
      allOf:
        - $ref: '#/components/schemas/HostSummary'
        - type: object
          required: [effectivePolicy, recentRules, recentOperations, targetProfile]
          properties:
            labels:
              type: array
              items:
                type: string
            targetProfile:
              $ref: '#/components/schemas/TargetProfile'
            effectivePolicy:
              $ref: '#/components/schemas/ExposurePolicy'
            recentRules:
              type: array
              items:
                $ref: '#/components/schemas/BridgeRule'
            recentOperations:
              type: array
              items:
                $ref: '#/components/schemas/OperationSummary'
    CreateHostRequest:
      type: object
      required: [name, ssh]
      properties:
        name:
          type: string
        targetProfileId:
          type: string
        labels:
          type: array
          items:
            type: string
        ssh:
          $ref: '#/components/schemas/SshConnection'
    ProbeHostRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [read_only]
    BootstrapHostRequest:
      type: object
      required: [sshUser, desiredAgentPort]
      properties:
        sshUser:
          type: string
        desiredAgentPort:
          type: integer
          minimum: 1
          maximum: 65535
        installPrefix:
          type: string
        backupPolicy:
          type: string
          enum: [best_effort, required]
    SshConnection:
      type: object
      required: [host, port]
      properties:
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
    BridgeRule:
      type: object
      required: [id, hostId, protocol, listenPort, targetHost, targetPort, lifecycleState]
      properties:
        id:
          type: string
        hostId:
          type: string
        name:
          type: string
        protocol:
          type: string
          enum: [tcp]
        listenPort:
          type: integer
          minimum: 1
          maximum: 65535
        targetHost:
          type: string
        targetPort:
          type: integer
          minimum: 1
          maximum: 65535
        lifecycleState:
          type: string
          enum: [desired, applying, applied_unverified, active, degraded, rollback_pending, rolled_back, removed]
        lastVerifiedAt:
          type: string
          format: date-time
        lastRollbackPointId:
          type: string
    CreateBridgeRuleRequest:
      type: object
      required: [hostId, protocol, listenPort, targetHost, targetPort]
      properties:
        hostId:
          type: string
        name:
          type: string
        protocol:
          type: string
          enum: [tcp]
        listenPort:
          type: integer
          minimum: 1
          maximum: 65535
        targetHost:
          type: string
        targetPort:
          type: integer
          minimum: 1
          maximum: 65535
    UpdateBridgeRuleRequest:
      type: object
      properties:
        name:
          type: string
        listenPort:
          type: integer
          minimum: 1
          maximum: 65535
        targetHost:
          type: string
        targetPort:
          type: integer
          minimum: 1
          maximum: 65535
    ExposurePolicy:
      type: object
      required: [hostId, allowedSources, excludedPorts, samePortMirror, conflictPolicy, backupPolicy]
      properties:
        hostId:
          type: string
        allowedSources:
          type: array
          items:
            type: string
        excludedPorts:
          type: array
          items:
            type: integer
        samePortMirror:
          type: boolean
        conflictPolicy:
          type: string
          enum: [reject, replace_existing]
        backupPolicy:
          type: string
          enum: [best_effort, required]
    ExposurePolicyUpdateRequest:
      $ref: '#/components/schemas/ExposurePolicy'
    BatchExposurePolicyApplyRequest:
      type: object
      required: [hostIds, allowedSources, excludedPorts, samePortMirror, conflictPolicy, backupPolicy]
      properties:
        hostIds:
          type: array
          items:
            type: string
        allowedSources:
          type: array
          items:
            type: string
        excludedPorts:
          type: array
          items:
            type: integer
        samePortMirror:
          type: boolean
        conflictPolicy:
          type: string
          enum: [reject, replace_existing]
        backupPolicy:
          type: string
          enum: [best_effort, required]
    HealthCheck:
      type: object
      required: [id, hostId, category, status, checkedAt]
      properties:
        id:
          type: string
        hostId:
          type: string
        ruleId:
          type: string
        category:
          type: string
          enum: [host_probe, bridge_verify, diagnostics]
        status:
          type: string
          enum: [healthy, degraded, failed]
        summary:
          type: string
        backupPolicy:
          type: string
          enum: [best_effort, required]
        checkedAt:
          type: string
          format: date-time
    OperationSummary:
      type: object
      required: [id, type, state, startedAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [create_host, probe_host, bootstrap_host, create_rule, update_rule, remove_rule, apply_policy, batch_apply_policy, verify_rule, backup, diagnostics, rollback]
        state:
          type: string
          enum: [queued, running, succeeded, failed, degraded, cancelled]
        hostId:
          type: string
        ruleId:
          type: string
        parentOperationId:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        resultSummary:
          type: string
        backupId:
          type: string
        rollbackPointId:
          type: string
    OperationDetail:
      allOf:
        - $ref: '#/components/schemas/OperationSummary'
        - type: object
          properties:
            initiator:
              type: string
              enum: [web, cli, automation]
            eventStreamUrl:
              type: string
            backupId:
              type: string
            rollbackPointId:
              type: string
            diagnosticResult:
              $ref: '#/components/schemas/PortDiagnosticResult'
            snapshotResult:
              $ref: '#/components/schemas/WebSnapshotResult'
            childOperations:
              type: array
              items:
                $ref: '#/components/schemas/OperationSummary'
            batchSummary:
              $ref: '#/components/schemas/BatchOperationSummary'
    BatchOperationSummary:
      type: object
      required: [totalTargets, succeededTargets, degradedTargets, failedTargets, targetHostIds]
      properties:
        totalTargets:
          type: integer
          minimum: 0
        succeededTargets:
          type: integer
          minimum: 0
        degradedTargets:
          type: integer
          minimum: 0
        failedTargets:
          type: integer
          minimum: 0
        targetHostIds:
          type: array
          items:
            type: string
    OperationEvent:
      type: object
      required:
        [id, kind, operationId, operationType, state, level, summary, emittedAt]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [operation_state_changed]
        operationId:
          type: string
        operationType:
          type: string
          enum: [create_host, probe_host, bootstrap_host, create_rule, update_rule, remove_rule, apply_policy, batch_apply_policy, verify_rule, backup, diagnostics, rollback]
        state:
          type: string
          enum: [queued, running, succeeded, failed, degraded, cancelled]
        level:
          type: string
          enum: [info, success, warn, error]
        summary:
          type: string
        hostId:
          type: string
        ruleId:
          type: string
        emittedAt:
          type: string
          format: date-time
    EventListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperationEvent'
    EventAuditIndexEntry:
      type: object
      required: [operation, eventCount, linkedArtifacts]
      properties:
        operation:
          $ref: '#/components/schemas/OperationDetail'
        latestEvent:
          oneOf:
            - $ref: '#/components/schemas/OperationEvent'
            - type: 'null'
        eventCount:
          type: integer
          minimum: 0
